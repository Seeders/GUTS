<div id="graphics-editor-container" class="ge">

  <!-- ===== Top toolbar ===== -->
  <div class="ge__toolbar">
    <div class="ge__tool-group">
      <span class="ge__tool-label">Model</span>
      <button id="add-shape" class="ge__btn" title="Add shape (duplicates selection)">+ Shape</button>
      <button id="delete-shape" class="ge__btn ge__btn--quiet" title="Delete selected shape">−</button>
      <button id="create-group" class="ge__btn" title="Create group">+ Group</button>
      <button id="delete-group" class="ge__btn ge__btn--quiet" title="Delete selected group (must be empty)">−</button>
    </div>
    <span class="ge__sep"></span>
    <div class="ge__tool-group">
      <span class="ge__tool-label">Animation</span>
      <button id="add-animation" class="ge__btn" title="Add animation">+ Anim</button>
      <button id="delete-animation" class="ge__btn ge__btn--quiet" title="Delete animation">−</button>
      <button id="add-frame" class="ge__btn" title="Add frame (duplicates current)">+ Frame</button>
      <button id="delete-frame" class="ge__btn ge__btn--quiet" title="Delete frame">−</button>
      <button id="preview-animation" class="ge__btn" title="Toggle animation preview">▶ Preview</button>
    </div>
    <span class="ge__spacer"></span>
    <button id="generate-isometric" class="ge__btn ge__btn--primary" title="Bake isometric sprite sheets from this model">⬒ Bake Sprites</button>
  </div>

  <!-- ===== Main: structure | canvas | inspector ===== -->
  <div class="ge__main">

    <!-- Left: timeline + structure + equipment -->
    <div class="ge__left">
      <div class="ge__section">
        <div class="ge__eyebrow">Timeline</div>
        <div id="frame-list" class="ge__list"></div>
      </div>
      <div class="ge__section">
        <div class="ge__eyebrow">Groups</div>
        <div id="group-list" class="ge__list"></div>
      </div>
      <div class="ge__section ge__section--grow">
        <div class="ge__eyebrow">Shapes</div>
        <div id="shape-list" class="ge__list ge__list--grow"></div>
      </div>
      <div class="ge__section">
        <div class="ge__eyebrow">Equipment</div>
        <div class="ge__form-row">
          <select id="equipment-item-selector" class="ge__select">
            <option value="">Select Item...</option>
          </select>
        </div>
        <div class="ge__form-row">
          <select id="equipment-slot-selector" class="ge__select">
            <option value="">Select Slot...</option>
            <option value="mainHand">Main Hand</option>
            <option value="offHand">Off Hand</option>
            <option value="head">Head</option>
            <option value="chest">Chest</option>
            <option value="back">Back</option>
            <option value="legs">Legs</option>
            <option value="feet">Feet</option>
          </select>
        </div>
        <div class="ge__row">
          <button id="equipment-add-btn" class="ge__btn">+ Equip</button>
          <button id="equipment-remove-btn" class="ge__btn ge__btn--quiet">Remove</button>
        </div>
        <div id="equipment-list" class="ge__list"></div>
      </div>
    </div>

    <!-- Center: 3D canvas + status bar -->
    <div class="ge__center">
      <canvas id="graphics-editor-canvas"></canvas>
      <div class="ge__status">
        <span class="ge__status-item">Shapes <b id="shape-count">0</b></span>
        <span class="ge__status-item">Equipment <b id="equipment-count">0</b></span>
        <span class="ge__status-item"><b id="selected-equipment">None</b></span>
        <span class="ge__spacer"></span>
        <span class="ge__status-hint">click select · drag orbit · right-drag pan · scroll zoom</span>
      </div>
    </div>

    <!-- Right: inspector + attachment -->
    <div class="ge__right">
      <div class="ge__section ge__section--grow">
        <div class="ge__eyebrow">Inspector</div>
        <div id="inspector"></div>
      </div>
      <div id="equipment-inspector" class="ge__section">
        <div class="ge__eyebrow">Attachment</div>
        <div class="ge__form-row">
          <label class="ge__label">Bone</label>
          <select id="equipment-bone-selector" class="ge__select">
            <option value="">Auto-detect</option>
          </select>
        </div>
        <div class="ge__form-row">
          <label class="ge__label">Offset</label>
          <div class="ge__triplet">
            <input type="number" id="equipment-offset-x" class="ge__input" step="0.1" value="0" title="X">
            <input type="number" id="equipment-offset-y" class="ge__input" step="0.1" value="0" title="Y">
            <input type="number" id="equipment-offset-z" class="ge__input" step="0.1" value="0" title="Z">
          </div>
        </div>
        <div class="ge__form-row">
          <label class="ge__label">Rotation°</label>
          <div class="ge__triplet">
            <input type="number" id="equipment-rotation-x" class="ge__input" step="1" value="0" title="X">
            <input type="number" id="equipment-rotation-y" class="ge__input" step="1" value="0" title="Y">
            <input type="number" id="equipment-rotation-z" class="ge__input" step="1" value="0" title="Z">
          </div>
        </div>
        <div class="ge__eyebrow">Item</div>
        <div id="equipment-property-list"></div>
      </div>
      <div id="json-editor" style="display: none;">
        <textarea id="json-content"></textarea>
      </div>
    </div>
  </div>
</div>
