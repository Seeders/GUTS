<div id="behavior-tree-editor-container" class="editor-module">
    <div class="editor-module__sidebar editor-module__sidebar--left">
        <div class="editor-module__section">
            <h3 class="editor-module__section-title">Tree Info</h3>
            <div class="editor-module__form-row">
                <label class="editor-module__label">Unit Type:</label>
                <span id="bt-unit-type" class="editor-module__text"></span>
            </div>
            <div class="editor-module__form-row">
                <label class="editor-module__label">Description:</label>
                <span id="bt-description" class="editor-module__text"></span>
            </div>
        </div>

        <div class="editor-module__section">
            <h3 class="editor-module__section-title">Simulation</h3>
            <div class="bt-sim-controls">
                <button id="bt-step-btn" class="editor-module__btn editor-module__btn--primary" title="Evaluate tree once">Step</button>
                <button id="bt-play-btn" class="editor-module__btn editor-module__btn--primary" title="Evaluate tree continuously">▶ Play</button>
            </div>
            <button id="bt-reset-sim-btn" class="editor-module__btn bt-reset-btn">Reset</button>
            <div id="bt-sim-result" class="bt-sim-result" style="display: none;"></div>
        </div>

        <div class="editor-module__section">
            <h3 class="editor-module__section-title">Node Types Reference</h3>
            <div class="bt-legend">
                <div><strong class="bt-legend__type--selector">selector:</strong> Try children until one succeeds</div>
                <div><strong class="bt-legend__type--sequence">sequence:</strong> Execute children in order</div>
                <div><strong class="bt-legend__type--condition">condition:</strong> Check a condition</div>
                <div><strong class="bt-legend__type--action">action:</strong> Execute an action</div>
            </div>
        </div>
    </div>

    <div class="editor-module__canvas-area">
        <div class="bt-canvas-header">
            <h2 id="bt-tree-title">Behavior Tree Visualization</h2>
        </div>
        <div id="bt-tree-canvas" class="bt-tree-canvas"></div>
        <div id="bt-validation-output" class="bt-validation-output"></div>
    </div>

    <div class="editor-module__sidebar editor-module__sidebar--right">
        <div class="editor-module__section">
            <h3 class="editor-module__section-title">Mock Entities</h3>
            <div id="bt-simulation-vars" class="bt-simulation-vars"></div>
        </div>
    </div>
</div>
